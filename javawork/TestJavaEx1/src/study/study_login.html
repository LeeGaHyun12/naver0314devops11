<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>로그인 페이지</title>
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUITE/fonts/static/woff2/SUITE.css" rel="stylesheet">
   <style>
    *{
    padding: 0;
    margin: 0;
    border: none;
    }
    body{
    font-size: 14px;
    font-family: 'SUITE', sans-serif;
    }
    .login-wrapper{
        width: 400px;
        height: 350px;
        padding: 40px;
        box-sizing: border-box;
    }

    .login-wrapper > h2{
        font-size: 24px;
        color: black;
        margin-bottom: 20px;
    }
    #login-form > input{
        width: 100%;
        height: 48px;
        padding: 0 10px;
        box-sizing: border-box;
        margin-bottom: 16px;
        border-radius: 30px;
        background-color: #F8F8F8;
    }
    #login-form > input::placeholder{
        color: dimgray;
    }
    #login-form > input[type="submit"]{
        color: whit;
        font-size: 16px;
        background-color: black;
        margin-top: 20px;
    }

    </style>
</head>
<body>
   <div>
       <h1>메인</h1>
       <p align="right">마이페이지   로그아웃</p>

       <hr>

       <h1>MyPage</h1>

       ◀︎  이전 페이지

   </div>

    <div class="login-wrapper">
        <h2>개인정보 수정</h2>
        <h3>닉네임 변경</h3>
        <form method="post" id="login-form">
            <input type="text" name="userName" placeholder="변경할 닉네임을 입력하세요">

            <input type="submit" value="변경">
        </form>
        <h3>비밀번호 변경</h3>
        <form method="post" id="login-form">
            <input type="text" name="userName" placeholder="현재 비밀번호를 입력하세요">
            <input type="password" name="userPassword" placeholder="새로운 비밀번호를 입력하세요">

            <input type="submit" value="변경">
        </form>
    </div>

</div>

</body>
</html>
