<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        window.onload=function () {
        },1000);
        }
    </script>
</head>
<body>
<h2>5개의 random() 값 발생</h2>
<script>
    for(let i=1;i<=5;i++) {
        let r = Math.random();
        document.write(r + "<br>");
    }
</script>
<hr>
<h2> 5개의 0~99사이 값 발생</h2>
<script>
    for(let i=1;i<=5;i++){
        let r=parseInt(Math.random()*100);
        document.write(r+"<br>");
    }
</script>
<hr>
</body>
</html>
