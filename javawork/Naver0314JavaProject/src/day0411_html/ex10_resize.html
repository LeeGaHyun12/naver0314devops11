<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Dancing+Script:wght@400..700&family=East+Sea+Dokdo&family=Gaegu&family=Gamja+Flower&family=Pacifico&family=Single+Day&display=swap"
          rel="stylesheet">
    <style>
        div.box{
            width: 400px;
            height: 300px;
            border: 2px solid gray;
            overflow: hidden; /*크기보다 내용이 많더라도 스크롤바를 숨김*/
            padding: 5px;
            resize: both; /*양쪽 사이즈를 늘ㄹ릴 수 있음*/
        }
    </style>
</head>

<body>
<div class="box">
    아 진짜 웃기다... 하윤띠...


</div>

</html>
