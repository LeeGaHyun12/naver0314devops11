<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>

          rel="stylesheet">
    <style>
        #wrap{
            width: 90%;
            margin: 10px auto;
        }
        figure,figcaption{
            display: block;

        }
        #photo figcaption{display: none;}
        #photo img{
            width: 90%;
            max-width: 800px;
            height: auto;
        }
    </style>
</head>
<body>
<div id="wrap">
    <section id="photo">
        <figure>
        <img src="../image/mycarimage/car1.png"
             width="800" height="200" alt="사진1">
            <figcaption><b>차 #1</b></figcaption>
        </figure>
        <figure>
            <img src="../image/mycarimage/car2.png"
                 width="800" height="200" alt="사진1">
            <figcaption><b>차 #2</b></figcaption>
        </figure>
        <figure>
            <img src="../image/mycarimage/car3.png"
                 width="800" height="200" alt="사진1">
            <figcaption><b>차 #3</b></figcaption>
        </figure>
    </section>
</div>
</body>
</html>
