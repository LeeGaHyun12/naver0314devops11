<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Dancing+Script:wght@400..700&family=East+Sea+Dokdo&family=Jua&family=Gaegu&family=Gamja+Flower&family=Pacifico&family=Single+Day&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <style>
        body *{
            font-family: 'Jua';
        }
    </style>
    <script>
        $(function(){
            // jQuery 문서가 준비되면 실행됩니다.

            // 모든 이미지 요소의 스타일을 변경합니다.
            $("img").css({
                "margin":"5px",
                "border":"1px solid red",
                "cursor":"crosshair"
            });

            // 첫 번째 이미지 요소의 속성을 변경하여 이미지를 다른 이미지로 교체하고 크기를 변경합니다.
            $("img:eq(0)").attr("src","../image/shop/26.jpg").attr("width","40");

            // 홀수번째 이미지 요소의 속성을 변경하여 이미지를 다른 이미지로 교체합니다.
            $("img:odd").attr("src","../image/shop/14.jpg");

            // 5번째 이미지 요소의 스타일과 속성을 동시에 변경하여 이미지를 다른 이미지로 교체하고 테두리를 변경합니다.
            $("img:eq(4)").css("border","5px groove orange").attr("src","../image/shop/24.gif");

            // 이미지에 마우스 오버 이벤트를 추가합니다.
            $("img").mouseover(function(){
                // 현재 이미지의 소스를 저장합니다.
                photo = $(this).attr("src");

                // 1부터 15까지의 랜덤한 숫자를 생성합니다.
                let r = parseInt(Math.random()*15)+1;

                // 새로운 이미지 소스를 생성합니다.
                let newsrc = `../image/mycar/mycar${r}.png`;

                // 현재 이미지의 소스를 새로운 이미지 소스로 변경합니다.
                $(this).attr("src", newsrc);
            });

            // 이미지에 마우스 아웃 이벤트를 추가합니다.
            $("img").mouseout(function(){
                // 이전의 이미지 소스로 이미지를 되돌립니다.
                $(this).attr("src", photo);
            });
        });
    </script>

</head>
<body>
<h6 class="alert alert-warning">attr 은 속성을 변경하거나 속성값을 얻는 함수입니다</h6>

<script>
    for(let i=1;i<=15;i++){
        document.write(`<img src="../image/mycar/mycar${i}.png" width="100">`);
    }
</script>

</body>
</html>
