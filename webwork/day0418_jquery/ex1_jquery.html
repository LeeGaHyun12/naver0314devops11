<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Dancing+Script:wght@400..700&family=East+Sea+Dokdo&family=Jua&family=Gaegu&family=Gamja+Flower&family=Pacifico&family=Single+Day&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
  <style>
    body *{
      font-family: 'Jua';
    }
  </style>
  <script>
    $(function (){
      // jQuery 문서가 준비되면 실행됩니다.

      // div 태그 중 class가 "hello"인 요소의 글자색을 녹색으로 변경합니다.
      $("div.hello").css("color","green");

      // div 태그 중 class가 "hello"인 요소의 글자색 값을 변수에 저장합니다.
      let color1 = $("div.hello").css("color");

      // id가 "bit2"인 요소의 배경색을 변수 color1의 값으로 설정합니다.
      $("#bit2").css("background-color", color1);

      // div 태그 중 class가 "bit3"인 요소의 하위 요소 중 class가 "bit4"인 요소들의 스타일을 변경합니다.
      $("div.bit3>div.bit4").css({
        "color": "magenta",
        "background-color": "yellow"
      });

      // div 태그 중 class가 "bit3"인 요소의 하위 요소 중 두 번째 요소의 테두리를 추가합니다.
      $("div.bit3>div.bit4").eq(1).css("border", "1px solid gray");

      // class가 "hello"인 요소의 스타일을 동시에 변경합니다.
      $(".hello").css({
        "background-color": "orange",
        "margin-top": "20px",
        "width": "200px",
        "border": "3px dotted red"
      });

      // body 태그의 모든 하위 요소의 글꼴을 "Dancing Script"으로 변경합니다.
      $("body *").css("font-family", "Dancing Script");

      // id가 "bit" 또는 "bit2"인 요소의 텍스트에 밑줄을 추가합니다.
      $("#bit,#bit2").css("text-decoration", "underline");
    });
  </script>

</head>
<body>
<div class="hello">
  Div class hello
</div>
<h3 class="hello">h3 class hello</h3>
<b id="bit">b tag id bit</b>
<h1 id="bit2">h1 id bit2</h1>
<div class="bit3">
  bit3 class
  <div class="bit4">
    bit3 아래 bit4 class 1
  </div>
  <div class="bit4">
    bit3 아래 bit4 class 2
  </div>
</div>
</body>
</html>
